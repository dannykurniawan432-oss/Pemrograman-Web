<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript</title>
</head>
<body>
    <h2>Contoh IF</h2>
    <script>
          let usia = prompt("Berapa usia Anda?");
        usia = parseInt(usia);

        if (usia >= 18) {
            document.write("<p>Usia Anda " + usia + " tahun, Anda sudah dewasa.</p>");
        }

    </script>
    
</body>
</html>
