<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>perulangan</title>
</head>
<body>
    <h2>Perulangan Untuk Menjumlahkan Angka</h2>
    <script>
        let jumlah = 0;
        for (let i = 1; i <= 10; i++) {
            jumlah += i;
        }
        document.write("Jumlah dari 1 sampai 10 adalah: " + jumlah);
    </script>
</body>
</html>
