<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perulanagan</title>
</head>
<body>
    <h2>Decrement pada perulangan</h2>
    <div id="hasil"></div>
    <script>
        let teks = "";
        for (let i = 100; i >= 0; i -= 10) {
            teks += i + " ";
        }
        document.getElementById("hasil").innerHTML = teks;
    </script>
</body>
</html>
