<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIMASI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        h2 {
            color: #2c3e50;
        }
        #text {
            opacity : 0;
            transition : opacity 1.2s;
            font-size : 20px;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h2>Animasi Fade In</h2>
   <p>Klik tombol untuk menampilkan teks secara Perlahan</p>
    <button id="tampil">Tampilkan Teks</button>
    <p id="text">Selamat datang di kuliah pengantar pemrograman web!</p>

    <script>
        document.getElementById('tampil').addEventListener('click', function() {
            document.getElementById('text').style.opacity = 1;
        });
    </script>
</body>
</html>
