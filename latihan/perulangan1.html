<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perulangan 1</title>
</head>
<body>
    <h2>Increment pada perulangan</h2>
    <div id="hasil"></div>
    <script>
        let teks = "";
        for (let i = 5; i <= 12; i += 2) {
            teks += i + " ";
        }
        document.getElementById("hasil").innerHTML = teks;
    </script>
</body>
</html>
