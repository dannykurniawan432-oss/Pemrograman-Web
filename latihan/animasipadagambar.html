<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIMASI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        h2 {
            color: #2c3e50;
        }
        #foto {
            width: 200px;
            border-radius: 10px;
            transition: transform 0.04s, opacity 0.4s;
            cursor: pointer;
        }
        #foto:hover {
            transform: scale(1.2) rotate(3deg);

        }
        .hilang {
            opacity: 0.1;
        }
    </style>
</head>
<body>
    <h2>Animasi Pada Gambar</h2>
    <p>Arahkan mouse ke gambar untuk zoom, klik gambar untuk efek fade.</p>
    <br />
    <img 
        src="https://hariannusantara.com/wp-content/uploads/2019/05/gambar-rangkaian-bunga4.jpg"
        id="foto"
        alt="Gambar Bunga"
    />
    <script>
        const gambar = document.getElementById('foto');
        gambar.addEventListener('click', function() {
            if (gambar.classList.contains('hilang')) {
                gambar.classList.add('hilang');
            } else {
                gambar.classList.remove('hilang');
            }
        });
    </script>
</body>
</html>
