<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript</title>
</head>
<body>
    <h2>Contoh IF...ELSE</h2>
    <script>
        let nilai = prompt("Berapa nilai UTS anda?");
        nilai = parseInt(nilai);

        if (nilai >= 56) {
            document.write("<p>Nilai Anda " + nilai + ", Anda Lulus!</p>");
        } else {
            document.write("<p>Nilai Anda " + nilai + ", Anda Tidak Lulus.</p>");
        }
    </script>
    
</body>
</html>
