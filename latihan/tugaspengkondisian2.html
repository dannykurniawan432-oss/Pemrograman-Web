<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=>, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>ganjil genap</h2>
    
    <script>
        let angka = prompt("Masukkan sebuah angka:");
        angka = parseInt(angka);

        if (angka % 2 === 0) {
            document.write("<p>Angka " + angka + " adalah bilangan genap.</p>");
        } else {
            document.write("<p>Angka " + angka + " adalah bilangan ganjil.</p>");
        }
    </script>
</body>
</html>
