<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>While</title>
</head>
<body>
    <h2>Deret perkalian</h2>
    <script>
        let p = 1;
        while (p <= 5000) {
            document.write(p + " ");
            p = p * 4;
        }
    </script>
</body>
</html>
